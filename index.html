<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Private Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['(', ')']],
                displayMath: [['$$', '$$'], ['[', ']']],
                processEscapes: true
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div id="header">
        <h2>Orion-0</h2>
        <div class="header-controls">
            <span id="token-counter">Tokens: 0 / 50k</span>
            <button id="restart-btn">Restart Chat</button>
        </div>
    </div>
    
    <div id="chat-container"></div>
    
    <div id="input-container">
        <div id="input-row">
            <select id="mode-selector">
                <option value="fast">fast, everyday</option>
                <option value="smart">smart, balanced</option>
                <option value="deep">deep, heavy duty</option>
            </select>
            
            <div id="input-wrapper">
                <textarea id="user-input" rows="1" placeholder="Message Orion..."></textarea>
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
